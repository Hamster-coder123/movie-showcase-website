<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Showcase Website</title>
    <meta
      name="description"
      content="A personal cinematic archive for movies I have watched."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(980px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .hero {
        min-height: calc(100vh - 64px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(4rem, 12vw, 8.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .intro {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.15rem, 2vw, 1.5rem);
        font-weight: 400;
        line-height: 1.55;
        text-wrap: balance;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 980px);
          padding: 24px 0;
        }

        .hero {
          min-height: calc(100vh - 48px);
          gap: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Personal cinematic archive</p>
          <h1 id="page-title">Movie Showcase Website</h1>
        </div>
        <p class="intro">
          A future home for watched movies, personal reviews, favorites, and movie pages with unique visual identities inspired by each film's mood, genre, contrast, and atmosphere.
        </p>
      </section>
    </main>
  </body>
</html>
