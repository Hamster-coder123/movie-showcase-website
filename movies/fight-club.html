<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fight Club</title>
    <meta
      name="description"
      content="A minimal movie page for Fight Club."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(960px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 40px 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
      }

      a {
        color: var(--text);
      }

      .back-link {
        align-self: flex-start;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
      }

      .back-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .movie {
        display: grid;
        gap: 18px;
      }

      .meta {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .description {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.55;
        text-wrap: balance;
      }

      .frames {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .frame {
        position: relative;
        aspect-ratio: 16 / 9;
        margin: 0;
        min-height: 160px;
        overflow: hidden;
        border: 1px solid #242424;
        background: #090909;
        isolation: isolate;
      }

      .frame::before,
      .frame::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .frame::before {
        z-index: -2;
      }

      .frame::after {
        z-index: -1;
        background:
          linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.5)),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 4px);
      }

      .frame span {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 12px;
        color: #d8d8d8;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .frame.basement::before {
        background:
          radial-gradient(circle at 50% 55%, #f6f6f6 0 2px, transparent 3px),
          radial-gradient(circle at 43% 58%, #b8b8b8 0 2px, transparent 3px),
          linear-gradient(180deg, #050505 0 45%, #1e1e1e 46% 100%);
      }

      .frame.static::before {
        background:
          repeating-linear-gradient(90deg, #050505 0 5px, #202020 5px 7px, #f2f2f2 7px 8px),
          repeating-linear-gradient(0deg, transparent 0 8px, rgba(255, 255, 255, 0.08) 8px 9px);
        mix-blend-mode: screen;
      }

      .frame.tower::before {
        background:
          linear-gradient(90deg, transparent 0 28%, #e8e8e8 29% 30%, transparent 31% 62%, #a6a6a6 63% 64%, transparent 65%),
          linear-gradient(180deg, #040404 0 25%, #1b1b1b 26% 100%);
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 960px);
          padding: 24px 0;
        }

        .frames {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="../index.html">Back to archive</a>
      <section class="movie" aria-labelledby="movie-title">
        <p class="meta">1999 / Directed by David Fincher</p>
        <h1 id="movie-title">Fight Club</h1>
        <p class="description">
          A stark, restless descent into identity, alienation, and the danger of turning emptiness into doctrine.
        </p>
      </section>
      <section class="frames" aria-label="Visual frames inspired by Fight Club">
        <figure class="frame basement">
          <span>Basement light</span>
        </figure>
        <figure class="frame static">
          <span>Signal noise</span>
        </figure>
        <figure class="frame tower">
          <span>City edge</span>
        </figure>
      </section>
    </main>
  </body>
</html>
