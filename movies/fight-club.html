<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fight Club</title>
    <meta
      name="description"
      content="A minimal movie page for Fight Club."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(720px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 32px 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
      }

      a {
        color: var(--text);
      }

      .back-link {
        align-self: flex-start;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
      }

      .back-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .movie {
        display: grid;
        gap: 18px;
      }

      .meta {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .description {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.55;
        text-wrap: balance;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 720px);
          padding: 24px 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="../index.html">Back to archive</a>
      <section class="movie" aria-labelledby="movie-title">
        <p class="meta">1999 / Directed by David Fincher</p>
        <h1 id="movie-title">Fight Club</h1>
        <p class="description">
          A stark, restless descent into identity, alienation, and the danger of turning emptiness into doctrine.
        </p>
      </section>
    </main>
  </body>
</html>
