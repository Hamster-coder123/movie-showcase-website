<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fight Club</title>
    <meta
      name="description"
      content="A minimal movie page for Fight Club."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(1120px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 40px 0 56px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
      }

      a {
        color: var(--text);
      }

      .back-link {
        align-self: flex-start;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
      }

      .back-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .movie {
        display: grid;
        gap: 18px;
      }

      .meta {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .description {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.55;
        text-wrap: balance;
      }

      .frame-wall {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(240px, 0.55fr);
        gap: 12px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        background: #050505;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(1) contrast(1.08);
      }

      .frame-large {
        aspect-ratio: 16 / 9;
      }

      .frame-stack {
        display: grid;
        gap: 12px;
      }

      .frame-small {
        aspect-ratio: 4 / 3;
      }

      .source {
        margin: -18px 0 0;
        color: var(--quiet);
        font-size: 0.74rem;
        line-height: 1.5;
      }

      .source a {
        color: var(--muted);
        text-underline-offset: 4px;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 1120px);
          padding: 24px 0;
        }

        .frame-wall {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="../index.html">Back to archive</a>
      <section class="movie" aria-labelledby="movie-title">
        <p class="meta">1999 / Directed by David Fincher</p>
        <h1 id="movie-title">Fight Club</h1>
        <p class="description">
          A stark, restless descent into identity, alienation, and the danger of turning emptiness into doctrine.
        </p>
      </section>
      <section aria-label="Movie frames">
        <div class="frame-wall">
          <figure class="frame-large">
            <img
              src="https://film-grab.com/wp-content/uploads/photo-gallery/01%20%28379%29.jpg?bwg=1547216723"
              alt="Wide night frame from Fight Club."
            >
          </figure>
          <div class="frame-stack">
            <figure class="frame-small">
              <img
                src="https://film-grab.com/wp-content/uploads/photo-gallery/03%20%28379%29.jpg?bwg=1547216723"
                alt="Close frame from Fight Club showing the narrator."
              >
            </figure>
            <figure class="frame-small">
              <img
                src="https://film-grab.com/wp-content/uploads/photo-gallery/04%20%28379%29.jpg?bwg=1547216723"
                alt="Interior frame from Fight Club with catalog text overlaid."
              >
            </figure>
          </div>
        </div>
      </section>
      <p class="source">
        Frames sourced from <a href="https://film-grab.com/2010/11/14/fight-club/">FilmGrab</a>.
      </p>
    </main>
  </body>
</html>
