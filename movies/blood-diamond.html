<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blood Diamond</title>
    <meta
      name="description"
      content="Blood Diamond follows a smuggler, a fisherman, and a journalist through the brutal trade behind one rare stone."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(1120px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 40px 0 56px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
      }

      a {
        color: var(--text);
      }

      .back-link {
        align-self: flex-start;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
      }

      .back-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .movie {
        display: grid;
        gap: 18px;
      }

      .meta {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .description {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.55;
        text-wrap: balance;
      }

      .frame-gallery {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        background: #050505;
      }

      .frame {
        aspect-ratio: 16 / 9;
      }

      .frame:nth-child(1),
      .frame:nth-child(8),
      .frame:nth-child(15) {
        grid-column: span 2;
        grid-row: span 2;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: contrast(1.04) saturate(1.04);
      }

      .source {
        margin: -16px 0 0;
        color: var(--quiet);
        font-size: 0.74rem;
        line-height: 1.5;
      }

      .source a {
        color: var(--muted);
        text-underline-offset: 4px;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 1120px);
          padding: 24px 0;
        }

        .frame-gallery {
          grid-template-columns: 1fr;
        }

        .frame:nth-child(1),
        .frame:nth-child(8),
        .frame:nth-child(15) {
          grid-column: auto;
          grid-row: auto;
        }
      }
    </style>
  </head>
