<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blood Diamond</title>
    <meta
      name="description"
      content="A minimal movie page for Blood Diamond."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff;
        --muted: #a6a6a6;
        --quiet: #5f5f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(960px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 40px 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
      }

      a {
        color: var(--text);
      }

      .back-link {
        align-self: flex-start;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 160ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
      }

      .back-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }

      .movie {
        display: grid;
        gap: 18px;
      }

      .meta {
        margin: 0;
        color: var(--quiet);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .description {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.55;
        text-wrap: balance;
      }

      .frames {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .frame {
        position: relative;
        aspect-ratio: 16 / 9;
        margin: 0;
        min-height: 160px;
        overflow: hidden;
        border: 1px solid #242424;
        background: #090909;
        isolation: isolate;
      }

      .frame::before,
      .frame::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .frame::before {
        z-index: -2;
      }

      .frame::after {
        z-index: -1;
        background:
          linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.44)),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 5px);
      }

      .frame span {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 12px;
        color: #d8d8d8;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .frame.landscape::before {
        background:
          linear-gradient(155deg, transparent 0 38%, #f2f2f2 39% 40%, transparent 41%),
          linear-gradient(15deg, #111 0 42%, #2a2a2a 43% 53%, #080808 54% 100%);
      }

      .frame.crossing::before {
        background:
          radial-gradient(circle at 62% 44%, #e8e8e8 0 2px, transparent 3px),
          linear-gradient(90deg, #050505, #2f2f2f 48%, #080808),
          repeating-linear-gradient(90deg, transparent 0 20px, rgba(255, 255, 255, 0.12) 21px 22px);
      }

      .frame.stone::before {
        background:
          radial-gradient(circle at 50% 45%, #fff 0 7px, #999 8px 14px, transparent 15px),
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.22), transparent 68px),
          #050505;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 32px, 960px);
          padding: 24px 0;
        }

        .frames {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="../index.html">Back to archive</a>
      <section class="movie" aria-labelledby="movie-title">
        <p class="meta">2006 / Directed by Edward Zwick</p>
        <h1 id="movie-title">Blood Diamond</h1>
        <p class="description">
          A tense political thriller about conflict, survival, and the human cost hidden behind a rare stone.
        </p>
      </section>
      <section class="frames" aria-label="Visual frames inspired by Blood Diamond">
        <figure class="frame landscape">
          <span>Border hills</span>
        </figure>
        <figure class="frame crossing">
          <span>Night crossing</span>
        </figure>
        <figure class="frame stone">
          <span>The stone</span>
        </figure>
      </section>
    </main>
  </body>
</html>
